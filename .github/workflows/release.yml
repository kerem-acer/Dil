name: Release

on:
  push:
    tags: ["v*"]

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write # create the GitHub release
      id-token: write # OIDC token for NuGet Trusted Publishing
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: actions/setup-dotnet@v5
        with:
          global-json-file: global.json
          cache: true
          cache-dependency-path: "**/packages.lock.json"

      - name: Extract version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - run: dotnet restore

      - run: dotnet build --no-restore -c Release -p:Version=${{ steps.version.outputs.VERSION }}

      - run: dotnet test --solution Dil.slnx --no-build -c Release -p:Version=${{ steps.version.outputs.VERSION }}

      - run: dotnet pack Dil.slnx --no-build -c Release -p:Version=${{ steps.version.outputs.VERSION }} -o ./artifacts

      # NuGet Trusted Publishing: exchange the GitHub OIDC token for a short-lived API key.
      # Requires a trusted-publishing policy on nuget.org (owner: kerem-acer, repo: Dil,
      # workflow: release.yml) and a NUGET_USER secret holding your nuget.org profile name.
      - name: NuGet login (OIDC → temporary API key)
        uses: NuGet/login@v1
        id: login
        with:
          user: ${{ secrets.NUGET_USER }}

      - name: Push to NuGet
        run: >
          dotnet nuget push ./artifacts/*.nupkg
          --api-key ${{ steps.login.outputs.NUGET_API_KEY }}
          --source https://api.nuget.org/v3/index.json
          --skip-duplicate

      - name: Create GitHub release
        run: gh release create "$GITHUB_REF_NAME" ./artifacts/*.nupkg ./artifacts/*.snupkg --generate-notes
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
